<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- 背景圆 -->
  <circle cx="64" cy="64" r="64" fill="#3B82F6"/>

  <!-- SOCKS5 代理图标设计 -->
  <g transform="translate(32, 32)">
    <!-- 服务器 -->
    <rect x="8" y="8" width="48" height="40" rx="4" fill="#1E3A8A" opacity="0.3"/>

    <!-- 连接线 -->
    <path d="M32 8 L32 24 M32 40 L32 48" stroke="#60A5FA" stroke-width="3" stroke-linecap="round"/>
    <path d="M16 16 L48 16 M16 24 L48 24 M16 32 L48 32" stroke="#60A5FA" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

    <!-- 锁图标（表示加密） -->
    <circle cx="32" cy="32" r="12" fill="#10B981"/>
    <rect x="28" y="34" width="8" height="8" rx="2" fill="white"/>
    <path d="M30 34 V30 A2 2 0 0 1 34 30 V34" stroke="white" stroke-width="2" fill="none"/>
  </g>

  <!-- 外圈光晕 -->
  <circle cx="64" cy="64" r="56" stroke="#60A5FA" stroke-width="2" opacity="0.3"/>
</svg>
