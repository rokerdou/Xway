<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- 背景圆 - 填充整个画布 -->
  <circle cx="64" cy="64" r="64" fill="#3B82F6"/>

  <!-- 弓箭图标 - 居中显示 -->
  <g transform="translate(32, 32)">
    <!-- 弓身 -->
    <path d="M 16 4 Q 4 32 16 60"
          stroke="white" stroke-width="8" stroke-linecap="round" fill="none"/>

    <!-- 弓弦 -->
    <line x1="16" y1="4" x2="16" y2="60"
          stroke="white" stroke-width="3" stroke-linecap="round"/>

    <!-- 箭杆 -->
    <line x1="16" y1="32" x2="56" y2="32"
          stroke="white" stroke-width="4" stroke-linecap="round"/>

    <!-- 箭头 -->
    <path d="M 56 32 L 44 20 M 56 32 L 44 44"
          stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- 箭羽 -->
    <line x1="24" y1="24" x2="24" y2="40" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="32" y1="24" x2="32" y2="40" stroke="white" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
