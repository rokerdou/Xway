name: Build and Release Server Binary

# и§ҰеҸ‘жқЎд»¶
on:
  push:
    branches: [ main, master ]
    paths:
      - 'server/**'
      - 'shared/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/release.yml'
  workflow_dispatch:  # е…Ғи®ёжүӢеҠЁи§ҰеҸ‘

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-release:
    name: Build Server Binary
    runs-on: ubuntu-latest

    # и®ҫзҪ®жқғйҷҗ
    permissions:
      contents: read

    steps:
      # ============================================
      # жӯҘйӘӨ 1: жЈҖеҮәжәҗз Ғ
      # ============================================
      - name: рҹ“Ҙ Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # иҺ·еҸ–е®Ңж•ҙеҺҶеҸІпјҢз”ЁдәҺзүҲжң¬дҝЎжҒҜ

      # ============================================
      # жӯҘйӘӨ 2: е®үиЈ… Rust е·Ҙе…·й“ҫ
      # ============================================
      - name: рҹҰҖ Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      # ============================================
      # жӯҘйӘӨ 3: зј“еӯҳдҫқиө–
      # ============================================
      - name: рҹ’ҫ Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: рҹ’ҫ Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: рҹ’ҫ Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-

      # ============================================
      # жӯҘйӘӨ 4: зј–иҜ‘ server
      # ============================================
      - name: рҹ”Ё Build server binary
        run: |
          echo "ејҖе§Ӣзј–иҜ‘ server..."
          cargo build --release -p server
          echo "вң“ зј–иҜ‘е®ҢжҲҗ"

          # жҳҫзӨәдәҢиҝӣеҲ¶дҝЎжҒҜ
          ls -lh target/release/server
          file target/release/server

          # жөӢиҜ•иҝҗиЎҢпјҲжҳҫзӨәзүҲжң¬пјү
          ./target/release/server --version || true

      # ============================================
      # жӯҘйӘӨ 5: иҝҗиЎҢжөӢиҜ•пјҲеҸҜйҖүпјү
      # ============================================
      - name: рҹ§Ә Run tests
        run: |
          echo "иҝҗиЎҢжөӢиҜ•..."
          cargo test --workspace --release
          echo "вң“ жөӢиҜ•йҖҡиҝҮ"

      # ============================================
      # жӯҘйӘӨ 6: е…ӢйҡҶеҸ‘еёғд»“еә“
      # ============================================
      - name: рҹ“Ҙ Clone releases repository
        run: |
          echo "е…ӢйҡҶеҸ‘еёғд»“еә“..."

          # дҪҝз”Ё GitHub Token и®ӨиҜҒ
          git clone \
            https://${{ secrets.RELEASES_TOKEN }}@github.com/${{ github.repository_owner }}/socks5-proxy-releases.git \
            releases-repo

          echo "вң“ еҸ‘еёғд»“еә“е·Іе…ӢйҡҶ"

      # ============================================
      # жӯҘйӘӨ 7: еӨҚеҲ¶дәҢиҝӣеҲ¶е’Ңй…ҚзҪ®
      # ============================================
      - name: рҹ“Ұ Copy binary and configs
        run: |
          echo "еӨҚеҲ¶ж–Үд»¶еҲ°еҸ‘еёғд»“еә“..."

          # еӨҚеҲ¶дәҢиҝӣеҲ¶
          cp target/release/server releases-repo/

          # еӨҚеҲ¶ DockerfileпјҲеҰӮжһңеҸ‘еёғд»“еә“жІЎжңүпјү
          if [ ! -f releases-repo/Dockerfile ]; then
            cp Dockerfile releases-repo/
            echo "вң“ е·ІеӨҚеҲ¶ Dockerfile"
          fi

          # еӨҚеҲ¶й…ҚзҪ®ж–Үд»¶пјҲеҰӮжһңеҸ‘еёғд»“еә“жІЎжңүпјү
          if [ ! -f releases-repo/server.toml ]; then
            cp server/config/server.toml releases-repo/server.toml
            echo "вң“ е·ІеӨҚеҲ¶й…ҚзҪ®ж–Үд»¶"
          fi

          # еҲӣе»ә READMEпјҲеҰӮжһңдёҚеӯҳеңЁпјү
          if [ ! -f releases-repo/README.md ]; then
            cat > releases-repo/README.md << 'EOF'
          # SOCKS5 д»ЈзҗҶжңҚеҠЎз«Ҝ - дәҢиҝӣеҲ¶еҸ‘еёғд»“еә“

          жӯӨд»“еә“з”ұ GitHub Actions иҮӘеҠЁз»ҙжҠӨпјҢеҢ…еҗ«йў„зј–иҜ‘зҡ„жңҚеҠЎз«ҜдәҢиҝӣеҲ¶ж–Үд»¶гҖӮ

          ## ж–Үд»¶иҜҙжҳҺ
          - `server`: Linux йў„зј–иҜ‘дәҢиҝӣеҲ¶ж–Үд»¶пјҲз”ұ CI иҮӘеҠЁжһ„е»әпјү
          - `Dockerfile`: еҚ•йҳ¶ж®өйғЁзҪІй…ҚзҪ®
          - `server.toml`: жңҚеҠЎз«Ҝй…ҚзҪ®ж–Үд»¶

          ## жӣҙж–°ж–№ејҸ
          дҝ®ж”№жәҗз Ғд»“еә“зҡ„ `server/` жҲ– `shared/` зӣ®еҪ•еҗҺпјҢGitHub Actions дјҡиҮӘеҠЁпјҡ
          1. зј–иҜ‘ Linux дәҢиҝӣеҲ¶
          2. жҺЁйҖҒеҲ°жӯӨд»“еә“
          3. dokploy иҮӘеҠЁжӢүеҸ–е№¶йғЁзҪІ

          ## жүӢеҠЁи§ҰеҸ‘
          и®ҝй—®жәҗз Ғд»“еә“зҡ„ Actions йЎөйқўпјҢйҖүжӢ© "Build and Release Server Binary" е·ҘдҪңжөҒпјҢзӮ№еҮ» "Run workflow"гҖӮ
          EOF
            echo "вң“ е·ІеҲӣе»ә README"
          fi

          # жҳҫзӨәж–Үд»¶еӨ§е°Ҹ
          FILE_SIZE=$(ls -lh releases-repo/server | awk '{print $5}')
          echo "дәҢиҝӣеҲ¶еӨ§е°Ҹ: ${FILE_SIZE}"

      # ============================================
      # жӯҘйӘӨ 8: жҸҗдәӨе№¶жҺЁйҖҒ
      # ============================================
      - name: рҹҡҖ Commit and push to releases repo
        run: |
          cd releases-repo

          # й…ҚзҪ® Git
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # жЈҖжҹҘжҳҜеҗҰжңүеҸҳжӣҙ
          if [ -z "$(git status --porcelain)" ]; then
            echo "в„№пёҸ жІЎжңүжЈҖжөӢеҲ°еҸҳжӣҙпјҢж— йңҖжҸҗдәӨ"
            exit 0
          fi

          # жҳҫзӨәеҸҳжӣҙ
          echo "жЈҖжөӢеҲ°д»ҘдёӢеҸҳжӣҙ:"
          git status --short

          # иҺ·еҸ–жҸҗдәӨдҝЎжҒҜ
          COMMIT_MSG="chore: иҮӘеҠЁжһ„е»ә - $(date '+%Y-%m-%d %H:%M:%S')

          жқҘжәҗд»“еә“: ${{ github.repository }}
          жқҘжәҗеҲҶж”Ҝ: ${{ github.ref_name }}
          жҸҗдәӨ SHA: ${{ github.sha }}
          жһ„е»әж—Ҙеҝ—: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # жҸҗдәӨеҸҳжӣҙ
          git add .
          git commit -m "$COMMIT_MSG"

          # жҺЁйҖҒ
          git push origin main

          echo "вң“ е·ІжҺЁйҖҒеҲ°еҸ‘еёғд»“еә“"

      # ============================================
      # жӯҘйӘӨ 9: з”ҹжҲҗжһ„е»әж‘ҳиҰҒ
      # ============================================
      - name: рҹ“Ҡ Build summary
        if: always()
        run: |
          echo "## рҹҺү жһ„е»әе®ҢжҲҗ" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **жәҗз Ғд»“еә“**: \`${{ github.repository }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **еҲҶж”Ҝ**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **жҸҗдәӨ**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **еҸ‘еёғд»“еә“**: \`${{ github.repository_owner }}/socks5-proxy-releases\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### рҹ“Ұ дәҢиҝӣеҲ¶дҝЎжҒҜ" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          ls -lh target/release/server >> $GITHUB_STEP_SUMMARY
          file target/release/server >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
